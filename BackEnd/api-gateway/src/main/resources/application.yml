server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  codec:
    max-in-memory-size: 10MB

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/products/**

            - id: upload-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/upload/**

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/orders/**

            - id: cart-service
              uri: lb://CART-SERVICE
              predicates:
                - Path=/api/cart/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**

            - id: farmer-service
              uri: lb://FARMER-SERVICE
              predicates:
                - Path=/api/farmers/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

security:
  jwt:
    secret: thisIsASecretKeyForJwtWhichIsAtLeast32BytesLong123
